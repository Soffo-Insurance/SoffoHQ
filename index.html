<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soffo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="preload" href="hero.png" as="image" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Access Code Wall -->
  <div id="accessWall" class="access-wall">
    <form id="accessForm" class="access-form">
      <input type="text" id="accessInput" class="access-input" placeholder="Enter access code" autocomplete="off" autofocus />
    </form>
  </div>

  <header>
    <a href="/" class="logo">Soffo</a>
    <div class="header-right" id="headerRight">
      <div class="header-bar">
        <div class="nav-toggle" id="navToggle">
          <span>Home</span>
          <svg class="chevron" width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2.5 3.75L5 6.25L7.5 3.75" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <a href="https://cal.com/seungyong/15min" target="_blank" class="cta">Book a demo</a>
      </div>
      <div class="nav-dropdown" id="navDropdown">
        <div class="nav-dropdown-inner">
          <a href="/">Home</a>
          <a href="/product">Product</a>
          <a href="/blog">Blog</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-section">
      <div class="heading-container">
        <h1 class="heading" id="typewriter"></h1>
      </div>
    </section>

    <section class="pills-section">
      <div class="pills">
        <div class="pill-slider"></div>
        <button class="pill active" data-index="0">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/></svg>
          <span>Add Documents</span>
        </button>
        <button class="pill" data-index="1">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 5H3"/><path d="M10 12H3"/><path d="M10 19H3"/><circle cx="17" cy="15" r="3"/><path d="m21 19-1.9-1.9"/></svg>
          <span>Node Extraction</span>
        </button>
        <button class="pill" data-index="2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.3 10a.7.7 0 0 1-.626-1.079L11.4 3a.7.7 0 0 1 1.198-.043L16.3 8.9a.7.7 0 0 1-.572 1.1Z"/><rect x="3" y="14" width="7" height="7" rx="1"/><circle cx="17.5" cy="17.5" r="3.5"/></svg>
          <span>Denial Classification</span>
        </button>
        <button class="pill" data-index="3">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 18v-7"/><path d="M11.12 2.198a2 2 0 0 1 1.76.006l7.866 3.847c.476.233.31.949-.22.949H3.474c-.53 0-.695-.716-.22-.949z"/><path d="M14 18v-7"/><path d="M18 18v-7"/><path d="M3 22h18"/><path d="M6 18v-7"/></svg>
          <span>Rebuttal Strategy</span>
        </button>
      </div>
    </section>

    <section class="image-section">
      <div class="image-wrap">
        <img src="image1.png" class="hero-img active" alt="Add Documents" loading="eager" decoding="async" fetchpriority="high" />
        <img src="image2.png" class="hero-img" alt="Node Extraction" loading="eager" decoding="async" />
        <img src="image3.png" class="hero-img" alt="Denial Classification" loading="eager" decoding="async" />
        <img src="image4.png" class="hero-img" alt="Rebuttal Strategy" loading="eager" decoding="async" />
      </div>
    </section>
  </main>

  <script>
    // Access code wall
    (function() {
      const ACCESS_CODE = 'soffo123';
      const wall = document.getElementById('accessWall');
      const form = document.getElementById('accessForm');
      const input = document.getElementById('accessInput');
      if (sessionStorage.getItem('soffo_access') === 'granted') {
        wall.remove();
      } else {
        document.body.classList.add('locked');
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          if (input.value.trim() === ACCESS_CODE) {
            sessionStorage.setItem('soffo_access', 'granted');
            wall.classList.add('fade-out');
            document.body.classList.remove('locked');
            setTimeout(() => wall.remove(), 400);
          } else {
            input.value = '';
            input.classList.add('shake');
            input.addEventListener('animationend', () => input.classList.remove('shake'), { once: true });
          }
        });
      }
    })();

    const navToggle = document.getElementById('navToggle');
    const headerRight = document.getElementById('headerRight');
    let dropdownOpen = false;

    navToggle.addEventListener('click', () => {
      dropdownOpen = !dropdownOpen;
      headerRight.classList.toggle('open', dropdownOpen);
    });

    document.addEventListener('click', (e) => {
      if (!headerRight.contains(e.target)) {
        dropdownOpen = false;
        headerRight.classList.remove('open');
      }
    });

    // Typewriter animation — word by word
    const line1 = "A trusted defensible reasoning layer";
    const line2 = "for insurance litigation";
    const allWords = [...line1.split(' '), '\n', ...line2.split(' ')];
    const container = document.getElementById('typewriter');
    let currentIndex = 0;

    function typeNextWord() {
      if (currentIndex >= allWords.length) return;

      if (allWords[currentIndex] === '\n') {
        container.appendChild(document.createElement('br'));
        currentIndex++;
        setTimeout(typeNextWord, 80);
        return;
      }

      if (currentIndex > 0 && allWords[currentIndex - 1] !== '\n') {
        container.appendChild(document.createTextNode(' '));
      }
      const span = document.createElement('span');
      span.textContent = allWords[currentIndex];
      span.classList.add('word');
      container.appendChild(span);

      // Trigger reflow so the initial state renders before transition starts
      span.offsetHeight;
      span.classList.add('word-grey');

      requestAnimationFrame(() => {
        setTimeout(() => {
          span.classList.remove('word-grey');
          span.classList.add('word-black');
          currentIndex++;
          setTimeout(typeNextWord, 50);
        }, 120);
      });
    }

    setTimeout(typeNextWord, 300);

    // Pill switching with crossfade + sliding indicator
    const pills = document.querySelectorAll('.pill');
    const heroImgs = document.querySelectorAll('.hero-img');
    const slider = document.querySelector('.pill-slider');

    function updateSlider() {
      const activePill = document.querySelector('.pill.active');
      const idx = parseInt(activePill.dataset.index);
      const pillWidth = pills[0].offsetWidth;
      slider.style.width = pillWidth + 'px';
      slider.style.transform = `translateX(${idx * pillWidth}px)`;
    }

    pills.forEach(pill => {
      pill.addEventListener('click', () => {
        const idx = parseInt(pill.dataset.index);
        pills.forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        heroImgs.forEach(img => img.classList.remove('active'));
        heroImgs[idx].classList.add('active');
        updateSlider();
      });
    });

    window.addEventListener('resize', updateSlider);
    updateSlider();
  </script>
</body>
</html>
