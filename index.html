<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soffo</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <a href="/" class="logo">Soffo</a>
    <div class="header-right" id="headerRight">
      <div class="header-bar">
        <div class="nav-toggle" id="navToggle">
          <span>Home</span>
          <svg class="chevron" width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2.5 3.75L5 6.25L7.5 3.75" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <a href="https://cal.com/seungyong/15min" target="_blank" class="cta">Book a demo</a>
      </div>
      <div class="nav-dropdown" id="navDropdown">
        <div class="nav-dropdown-inner">
          <a href="/">Home</a>
          <a href="/product">Product</a>
          <a href="/blog">Blog</a>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-section">
      <h1 class="heading" id="typewriter"></h1>
      <div class="heading-placeholder" aria-hidden="true">A trusted reasoning layer for<br>insurance carriers to win litigations</div>
    </section>

    <section class="image-section">
      <div class="image-wrap">
        <img src="hero.png" alt="Soffo product screenshot" />
      </div>
    </section>
  </main>

  <script>
    const navToggle = document.getElementById('navToggle');
    const headerRight = document.getElementById('headerRight');
    let dropdownOpen = false;

    navToggle.addEventListener('click', () => {
      dropdownOpen = !dropdownOpen;
      headerRight.classList.toggle('open', dropdownOpen);
    });

    document.addEventListener('click', (e) => {
      if (!headerRight.contains(e.target)) {
        dropdownOpen = false;
        headerRight.classList.remove('open');
      }
    });

    // Typewriter animation — word by word
    const line1 = "A trusted reasoning layer for";
    const line2 = "insurance carriers to win litigations";
    const allWords = [...line1.split(' '), '\n', ...line2.split(' ')];
    const container = document.getElementById('typewriter');
    let currentIndex = 0;

    function typeNextWord() {
      if (currentIndex >= allWords.length) return;

      if (allWords[currentIndex] === '\n') {
        container.appendChild(document.createElement('br'));
        currentIndex++;
        setTimeout(typeNextWord, 80);
        return;
      }

      const span = document.createElement('span');
      span.textContent = (currentIndex > 0 && allWords[currentIndex - 1] !== '\n' ? ' ' : '') + allWords[currentIndex];
      span.classList.add('word', 'word-grey');
      container.appendChild(span);

      requestAnimationFrame(() => {
        setTimeout(() => {
          span.classList.remove('word-grey');
          span.classList.add('word-black');
          currentIndex++;
          setTimeout(typeNextWord, 50);
        }, 120);
      });
    }

    setTimeout(typeNextWord, 300);
  </script>
</body>
</html>
